# JVM 인코딩 UTF-8 강제 설정 (한글 경로 처리)
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dsun.stdout.encoding=UTF-8 -Dsun.stderr.encoding=UTF-8
android.useAndroidX=true
# 한글 경로 포함 프로젝트 빌드 허용
android.overridePathCheck=true
