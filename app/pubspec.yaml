name: app
description: "LH 청약 공고 정보 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 환경변수
  flutter_dotenv: ^5.1.0

  # 상태관리
  flutter_riverpod: ^2.6.0

  # 라우팅
  go_router: ^14.0.0

  # 카카오맵
  kakao_map_plugin: ^0.4.0

  # 로깅
  logger: ^2.0.0

  # 스켈레톤 로딩
  shimmer: ^3.0.0

  # Supabase
  supabase_flutter: ^2.0.0

  # URL 실행
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
