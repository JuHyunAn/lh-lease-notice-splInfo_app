name: lh_lease_app
description: "LH 분양임대공고 정보 앱 - 한국토지주택공사 청약 정보를 한눈에"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ──────────────────────────────────────────────
  supabase_flutter: ^2.8.4        # Supabase 클라이언트

  # ── 라우팅 ────────────────────────────────────────────────
  go_router: ^14.8.1              # 선언적 라우팅

  # ── 상태관리 ──────────────────────────────────────────────
  flutter_riverpod: ^2.6.1        # Riverpod 상태관리
  riverpod_annotation: ^2.6.1

  # ── 지도 ──────────────────────────────────────────────────
  kakao_map_plugin: ^0.4.0        # 카카오맵 SDK

  # ── UI / UX ───────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0                 # 스켈레톤 로딩 효과
  cached_network_image: ^3.4.1    # 이미지 캐싱
  flutter_svg: ^2.0.10+1          # SVG 아이콘
  badges: ^3.1.2                  # 뱃지 (신규/마감임박)

  # ── 유틸리티 ──────────────────────────────────────────────
  intl: ^0.20.2                   # 날짜/숫자 한국어 포맷
  url_launcher: ^6.3.1            # PDF/외부 링크 열기
  share_plus: ^10.1.4             # 공유 기능
  flutter_dotenv: ^5.2.1          # 환경변수 관리
  logger: ^2.5.0                  # 디버깅 로그

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
  # 폰트: Pretendard 파일 준비 후 아래 주석 해제
  # fonts:
  #   - family: Pretendard
  #     fonts:
